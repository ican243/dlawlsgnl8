<head>
    <meta charset="UTF-8">
    <script type="text/javascript">
        for (var i = 0; i < 7; i++) {
            document.write((i + 1) + " : 임진휘<br>");
        }

        document.write("-------------------------------------<br>")

        var k = 0;
        while (k < 7) {
            document.write((k + 1) + " : 임진휘<br>");
            k = k + 1;
        }


        document.write("-----------------------------------<br>")

        for (var q = 0; q < 7;) {
            document.write("임진휘<br>")
            q = q + 1;
        }


    </script>
